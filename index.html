<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allianz Валутен Калкулатор</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #1e1e1e;
    color: white;
}

.header {
    background: #0d47a1;
    padding: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

.container {
    padding: 20px;
    max-width: 400px;
    margin: auto;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

input, select {
    background: #2a2a2a;
    color: white;
}

button {
    background: #0d47a1;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #1565c0;
}

.result {
    margin-top: 20px;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
}

.status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    color: #aaaaaa;
}
.ok { color: #7bd88f; }
.bad { color: #ff6b6b; }
</style>
</head>

<body>

<div class="header">
    Allianz Валутен Калкулатор
</div>

<div class="container">
    <input type="number" id="amount" placeholder="Въведи сума">

    <select id="from"></select>
    <select id="to"></select>

    <button onclick="convert()">Конвертирай</button>

    <div class="result" id="result">–</div>

    <div class="status">
        <div id="statusText">Зареждане...</div>
        <div>Auto refresh: <span id="countdown">120</span>s</div>
        <div id="updated"></div>
    </div>
</div>

<script>
const AUTO_REFRESH_SECONDS = 120;

// fallback (EUR base)
const FALLBACK = {
    EUR:1,
    USD:1.08,
    GBP:0.8734,
    BGN:1.95583,
    CHF:0.96,
    RON:4.97
};

let rates = {...FALLBACK};
let countdown = AUTO_REFRESH_SECONDS;

const elFrom = document.getElementById("from");
const elTo = document.getElementById("to");
const elResult = document.getElementById("result");
const elStatus = document.getElementById("statusText");
const elCountdown = document.getElementById("countdown");
const elUpdated = document.getElementById("updated");

function populate() {
    const list = Object.keys(rates).sort();
    elFrom.innerHTML = "";
    elTo.innerHTML = "";
    list.forEach(c=>{
        elFrom.innerHTML += `<option>${c}</option>`;
        elTo.innerHTML += `<option>${c}</option>`;
    });
    elFrom.value = "GBP";
    elTo.value = "EUR";
}

async function loadRates() {
    try {
        const res = await fetch("https://api.frankfurter.app/latest?from=EUR",{cache:"no-store"});
        const data = await res.json();
        rates = {...data.rates, EUR:1};
        elStatus.innerHTML = '<span class="ok">Live курсове активни</span>';
    } catch {
        rates = {...FALLBACK};
        elStatus.innerHTML = '<span class="bad">Fallback режим</span>';
    }

    populate();
    elUpdated.innerText = "Last update: " + new Date().toLocaleTimeString();
}

function convert(){
    const amount = parseFloat(document.getElementById("amount").value);
    if(!amount){ elResult.innerText="Невалидна сума"; return; }

    const from = elFrom.value;
    const to = elTo.value;

    const eur = amount / rates[from];
    const out = eur * rates[to];

    elResult.innerText = out.toFixed(2)+" "+to;
}

function startCountdown(){
    setInterval(async ()=>{
        countdown--;
        elCountdown.innerText = countdown;

        if(countdown<=0){
            await loadRates();
            convert();
            countdown = AUTO_REFRESH_SECONDS;
        }
    },1000);
}

// INIT
(async ()=>{
    await loadRates();
    startCountdown();
})();
</script>

</body>
</html>
